<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cat Manager</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 40px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        input { width: 70%; padding: 8px; }
        button { padding: 8px; cursor: pointer; }
        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { background: #f4f4f4; margin: 5px 0; padding: 10px; display: flex; justify-content: space-between; border-radius: 4px; }
        .btns button { margin-left: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <h2>Cat Database</h2>
    <input type="text" id="catName" placeholder="Cat name">
    <button onclick="handleSubmit()">Add</button>

    <ul id="catList"></ul>

    <script>
        const API = 'https://jaseembackend.onrender.com/api';
        let editingId = null;

        async function loadCats() {
            const res = await fetch(`${API}/cats`);
            const cats = await res.json();
            const list = document.getElementById('catList');
            list.innerHTML = '';
            cats.forEach(cat => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${cat.name}</span>
                    <div class="btns">
                        <button onclick="editCat('${cat._id}', '${cat.name}')">Edit</button>
                        <button onclick="deleteCat('${cat._id}')">Del</button>
                    </div>`;
                list.appendChild(li);
            });
        }

        async function handleSubmit() {
            const name = document.getElementById('catName').value;
            if (!name) return;
            const method = editingId ? 'PUT' : 'POST';
            const url = editingId ? `${API}/cats/${editingId}` : `${API}/submit-cat`;
            
            await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ catName: name })
            });

            editingId = null;
            document.getElementById('catName').value = '';
            loadCats();
        }

        function editCat(id, name) {
            editingId = id;
            document.getElementById('catName').value = name;
        }

        async function deleteCat(id) {
            await fetch(`${API}/cats/${id}`, { method: 'DELETE' });
            loadCats();
        }

        loadCats();
    </script>
</body>
</html>
