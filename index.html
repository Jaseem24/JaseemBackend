<!DOCTYPE html>
<html>
<head>
  <title>Cat App</title>
</head>
<body>

<h2>Cat App</h2>

<input type="text" id="catName" placeholder="Enter cat name">
<button onclick="handleSubmit()">Add Cat</button>

<h3>All Cats</h3>
<ul id="catList"></ul>

<script>
const API = 'http://localhost:3000/api'
let editingId = null

async function loadCats() {
  const res = await fetch(API + '/cats')
  const cats = await res.json()

  const list = document.getElementById('catList')
  list.innerHTML = ''

  cats.forEach(cat => {
    const li = document.createElement('li')
    li.innerHTML = `
      ${cat.name}
      <button onclick="editCat('${cat._id}', '${cat.name}')">Edit</button>
      <button onclick="deleteCat('${cat._id}')">Delete</button>
    `
    list.appendChild(li)
  })
}

async function handleSubmit() {
  const name = document.getElementById('catName').value

  if (!name) return alert('Enter name')

  if (editingId) {
    await fetch(`${API}/cats/${editingId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ catName: name })
    })
    editingId = null
  } else {
    await fetch(API + '/submit-cat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ catName: name })
    })
  }

  document.getElementById('catName').value = ''
  loadCats()
}

function editCat(id, name) {
  editingId = id
  document.getElementById('catName').value = name
}

async function deleteCat(id) {
  await fetch(`${API}/cats/${id}`, { method: 'DELETE' })
  loadCats()
}

loadCats()
</script>

</body>
</html>
